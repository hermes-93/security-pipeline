name: DAST (ZAP Baseline Scan)

on:
  schedule:
    - cron: "0 3 * * *"   # nightly at 03:00 UTC
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL to scan"
        required: false
        default: "https://staging.example.com"

permissions:
  issues: write
  contents: read

jobs:
  zap-baseline:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set target URL
        id: target
        run: |
          URL="${{ github.event.inputs.target_url || 'https://staging.example.com' }}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ steps.target.outputs.url }}
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"     # include alpha passive scan rules
          issue_title: "ZAP Baseline Scan Report"
          fail_action: false    # create issue but don't fail the build
          artifact_name: zap-report

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-${{ github.run_id }}
          path: |
            report_html.html
            report_json.json
          retention-days: 30
