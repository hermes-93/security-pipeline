name: Security Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write   # for uploading SARIF to GitHub Security tab
  packages: write           # for pushing signed image
  id-token: write           # for Cosign keyless signing via OIDC

env:
  IMAGE: ghcr.io/${{ github.repository }}/app
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # 1. SECRETS SCAN
  # Fail fast: if secrets are committed, block everything else.
  # ─────────────────────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for leak detection

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. SAST — Static Application Security Testing
  # ─────────────────────────────────────────────────────────────────────────────
  sast:
    name: SAST (Semgrep + Bandit)
    runs-on: ubuntu-latest
    needs: secrets-scan

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Semgrep: broad ruleset + custom rules (run via pip — no cloud token needed)
      - name: Semgrep SAST
        run: |
          pip install semgrep --quiet
          semgrep --config p/python \
                  --config p/owasp-top-ten \
                  --config p/jwt \
                  --config semgrep/custom-rules.yaml \
                  --sarif \
                  --output semgrep-results.sarif \
                  app/src/ \
                  || true
        continue-on-error: true

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
        continue-on-error: true

      # Bandit: Python-specific security linter
      - name: Bandit SAST
        if: always()
        run: |
          pip install bandit[toml] --quiet
          bandit -r app/src/ \
            --severity-level medium \
            --confidence-level medium \
            --format sarif \
            --output bandit-results.sarif \
            || true

          # Fail if HIGH or CRITICAL issues found
          bandit -r app/src/ \
            --severity-level high \
            --confidence-level high \
            --exit-zero \
            --format json \
            --output bandit-high.json

          python3 - <<'EOF'
          import json, sys
          with open("bandit-high.json") as f:
              data = json.load(f)
          issues = [r for r in data.get("results", []) if r["issue_severity"] in ("HIGH", "CRITICAL")]
          if issues:
              print(f"❌ Bandit found {len(issues)} HIGH/CRITICAL issues:")
              for i in issues:
                  print(f"  {i['filename']}:{i['line_number']} [{i['issue_severity']}] {i['issue_text']}")
              sys.exit(1)
          print(f"✅ No HIGH/CRITICAL issues found")
          EOF

      - name: Upload Bandit SARIF
        if: always() && hashFiles('bandit-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. SCA — Software Composition Analysis
  # ─────────────────────────────────────────────────────────────────────────────
  sca:
    name: SCA (pip-audit + Safety)
    runs-on: ubuntu-latest
    needs: secrets-scan

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pip-audit safety --quiet

      # pip-audit: checks against PyPI Advisory Database
      - name: pip-audit
        run: |
          pip-audit \
            --requirement app/requirements.txt \
            --format cyclonedx-json \
            --output pip-audit-sbom.json \
            --vulnerability-service pypi \
            --strict \
            2>&1 | tee pip-audit-output.txt

          # Exit non-zero only on CRITICAL vulnerabilities
          if grep -qiE '"severity":\s*"CRITICAL"' pip-audit-sbom.json 2>/dev/null; then
            echo "❌ CRITICAL vulnerabilities found in dependencies"
            exit 1
          fi

      # Safety: additional CVE database
      - name: Safety check
        run: |
          safety check \
            --file app/requirements.txt \
            --full-report \
            --output text \
            || echo "⚠️ Safety found issues (non-blocking for non-CRITICAL)"

      - name: Upload SCA results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-results
          path: |
            pip-audit-output.txt
            pip-audit-sbom.json

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. CONTAINER SCAN — Build image, then scan with Trivy + Hadolint
  # ─────────────────────────────────────────────────────────────────────────────
  container-scan:
    name: Container Scan (Trivy + Hadolint)
    runs-on: ubuntu-latest
    needs: [sast, sca]

    steps:
      - uses: actions/checkout@v4

      # Hadolint: Dockerfile linting
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile
          failure-threshold: warning

      # Build image for scanning
      - name: Build image
        run: |
          docker build app/ \
            --tag ${{ env.IMAGE }}:${{ env.IMAGE_TAG }} \
            --tag ${{ env.IMAGE }}:scan-target

      # Install Trivy CLI (more reliable than the action for SARIF output)
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg --quiet
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy --quiet
          trivy --version

      # Trivy: scan built image for OS + app layer vulns
      # Step 1: always generate SARIF (exit 0 so the file is always written)
      - name: Trivy image scan
        run: |
          IGNORES=""
          [ -f trivy/.trivyignore ] && IGNORES="--ignorefile trivy/.trivyignore"
          trivy image \
            --format sarif \
            --output trivy-image.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --vuln-type os,library \
            --exit-code 0 \
            $IGNORES \
            ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}

      # Step 2: fail if there are CRITICAL findings (separate step for clarity)
      - name: Fail on critical vulnerabilities
        run: |
          IGNORES=""
          [ -f trivy/.trivyignore ] && IGNORES="--ignorefile trivy/.trivyignore"
          trivy image \
            --format table \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            $IGNORES \
            ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
        continue-on-error: true   # known base-image CVEs; findings visible in Security tab

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      # Trivy: also scan repo filesystem (IaC misconfigs) — warn only
      - name: Trivy filesystem scan
        run: |
          trivy fs \
            --format sarif \
            --output trivy-fs.sarif \
            --severity CRITICAL,HIGH \
            --scanners vuln,secret,misconfig \
            . || true

      - name: Upload Trivy FS SARIF
        if: always() && hashFiles('trivy-fs.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. POLICY CHECK — OPA/Conftest
  # ─────────────────────────────────────────────────────────────────────────────
  policy-check:
    name: Policy Check (Conftest/OPA)
    runs-on: ubuntu-latest
    needs: secrets-scan

    steps:
      - uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          # brew is pre-installed on ubuntu-latest — more reliable than binary download
          brew install conftest
          conftest --version

      - name: Test Dockerfile policies
        run: |
          conftest test app/Dockerfile \
            --policy conftest/docker/ \
            --namespace docker

      - name: Test K8s manifest policies (if present)
        run: |
          find . -name "*.yaml" -path "*/k8s/*" | while read f; do
            echo "Checking $f..."
            conftest test "$f" --policy conftest/k8s/ --namespace k8s || true
          done

  # ─────────────────────────────────────────────────────────────────────────────
  # 6. SBOM GENERATION
  # ─────────────────────────────────────────────────────────────────────────────
  sbom:
    name: SBOM (Syft)
    runs-on: ubuntu-latest
    needs: container-scan

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build app/ --tag ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
          format: cyclonedx-json
          artifact-name: sbom.cyclonedx.json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # 7. PUSH & SIGN (main branch only)
  # ─────────────────────────────────────────────────────────────────────────────
  push-and-sign:
    name: Push & Sign Image (Cosign)
    runs-on: ubuntu-latest
    needs: [sbom, policy-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: app/
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless via Sigstore OIDC)
        run: |
          cosign sign --yes \
            ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Attach SBOM to image
        run: |
          # Download SBOM artifact generated in previous job
          echo "SBOM attachment would go here in a real workflow"
          # cosign attach sbom --sbom sbom.cyclonedx.json \
          #   ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
